name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build ExDoc site
    runs-on: ubuntu-24.04
    env:
      MIX_ENV: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Elixir
        uses: erlef/setup-elixir@v1
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache deps and build
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: docs-${{ runner.os }}-${{ hashFiles('.tool-versions') }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            docs-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

      - name: Fetch deps
        run: mix deps.get --check-locked

      - name: Generate docs
        run: mix docs

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: doc

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy docs
        id: deployment
        uses: actions/deploy-pages@v5
